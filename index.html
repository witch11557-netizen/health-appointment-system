<!DOCTYPE html>
<html>
<head>
    <title>Health Appointment System</title>
    <style>
        body { font-family: Arial; margin: 0; background: #eef2f7; }
        header { background: #0077b6; color: white; padding: 15px; text-align: center; }
        nav { background: #333; padding: 10px; text-align: center; }
        nav a { color: white; margin: 10px; text-decoration: none; cursor: pointer; }
        .container { padding: 20px; }
        .card { background: white; padding: 20px; margin: 10px 0; border-radius: 10px; }
        input, select { padding: 8px; width: 100%; margin-top: 5px; }
        button { margin-top: 10px; padding: 10px; background: #0077b6; color: white; border: none; }
        #dashboard, #appointment, #doctors { display: none; }
    </style>
</head>

<body>

<header>
    <h1>Online Health Appointment System</h1>
</header>

<nav id="menu" style="display:none;">
    <a onclick="show('dashboard')">Home</a>
    <a onclick="show('doctors')">Doctors</a>
    <a onclick="show('appointment')">Book</a>
    <a onclick="logout()">Logout</a>
</nav>

<div class="container">

    <!-- LOGIN -->
    <div id="login">
        <div class="card">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Enter Username">
            <button onclick="login()">Login</button>
            <p id="loginMsg"></p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <div class="card">
            <h2>Welcome <span id="user"></span></h2>
            <p>You can book appointments easily.</p>
        </div>

        <div class="card">
            <h3>Your Appointments</h3>
            <ul id="appointmentsList"></ul>
        </div>
    </div>

    <!-- DOCTORS -->
    <div id="doctors">
        <div class="card">
            <h2>Doctors</h2>
            <p>👨‍⚕️ Dr. Ravi - Cardiologist</p>
            <p>👩‍⚕️ Dr. Sneha - Dermatologist</p>
            <p>👨‍⚕️ Dr. Kumar - General Physician</p>
        </div>
    </div>

    <!-- APPOINTMENT -->
    <div id="appointment">
        <div class="card">
            <h2>Book Appointment</h2>

            <label>Doctor:</label>
            <select id="doctor">
                <option>Dr. Ravi</option>
                <option>Dr. Sneha</option>
                <option>Dr. Kumar</option>
            </select>

            <label>Date:</label>
            <input type="date" id="date">

            <button onclick="book()">Book</button>
            <p id="msg"></p>
        </div>
    </div>

</div>

<script>

let currentUser = "";

function login() {
    let name = document.getElementById("username").value;

    if(name === "") {
        document.getElementById("loginMsg").innerText = "Enter username!";
        return;
    }

    currentUser = name;
    document.getElementById("user").innerText = name;

    document.getElementById("login").style.display = "none";
    document.getElementById("menu").style.display = "block";
    show("dashboard");

    loadAppointments();
}

function logout() {
    location.reload();
}

function show(section) {
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("doctors").style.display = "none";
    document.getElementById("appointment").style.display = "none";

    document.getElementById(section).style.display = "block";
}

function book() {
    let doctor = document.getElementById("doctor").value;
    let date = document.getElementById("date").value;

    if(date === "") {
        document.getElementById("msg").innerText = "Select date!";
        return;
    }

    let appointment = doctor + " on " + date;

    let data = JSON.parse(localStorage.getItem(currentUser)) || [];
    data.push(appointment);
    localStorage.setItem(currentUser, JSON.stringify(data));

    document.getElementById("msg").innerText = "Appointment booked!";
    loadAppointments();
}

function loadAppointments() {
    let list = document.getElementById("appointmentsList");
    list.innerHTML = "";

    let data = JSON.parse(localStorage.getItem(currentUser)) || [];

    data.forEach(item => {
        let li = document.createElement("li");
        li.innerText = item;
        list.appendChild(li);
    });
}

</script>

</body>
</html>
